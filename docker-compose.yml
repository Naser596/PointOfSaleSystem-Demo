services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-5088}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-pos_platform};Username=${POSTGRES_USER:-pos_user};Password=${POSTGRES_PASSWORD:-pos_password}"
    volumes:
      - company-images:/app/wwwroot/images/company
      - product-images:/app/wwwroot/images/products

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-pos_platform}"
      POSTGRES_USER: "${POSTGRES_USER:-pos_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pos_password}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-pos_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  company-images:
  product-images:
  postgres-data:
